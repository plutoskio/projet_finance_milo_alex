<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="620" viewBox="0 0 1050 620">
  <rect width="1050" height="620" fill="#ffffff"/>
  <text x="70" y="38" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1F4E5F">FCF yield vs tire peers</text>
  <text x="70" y="60" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">Free cash flow divided by market capitalization. Higher is better, but negative yields show weak or negative trailing FCF.</text>

  <line x1="160" y1="455" x2="880" y2="455" stroke="#20252B" stroke-width="1.2"/>
  <line x1="480" y1="105" x2="480" y2="455" stroke="#20252B" stroke-width="1.4"/>
  <text x="470" y="480" font-family="Arial" font-size="11" fill="#6B7280">0%</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">
    <line x1="160" y1="105" x2="160" y2="455" stroke="#E6EBEF"/><text x="150" y="480">-8%</text>
    <line x1="320" y1="105" x2="320" y2="455" stroke="#E6EBEF"/><text x="310" y="480">-4%</text>
    <line x1="640" y1="105" x2="640" y2="455" stroke="#E6EBEF"/><text x="632" y="480">4%</text>
    <line x1="800" y1="105" x2="800" y2="455" stroke="#E6EBEF"/><text x="792" y="480">8%</text>
    <line x1="880" y1="105" x2="880" y2="455" stroke="#E6EBEF"/><text x="868" y="480">10%</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#20252B">
    <text x="70" y="132" font-weight="700">Michelin</text>
    <rect x="480" y="112" width="379" height="28" fill="#D1495B"/>
    <text x="870" y="132" font-weight="700" fill="#D1495B">9.48%</text>

    <text x="70" y="184">Bridgestone</text>
    <rect x="480" y="164" width="379" height="28" fill="#2A9D8F"/>
    <text x="870" y="184" fill="#2A9D8F">9.48%</text>

    <text x="70" y="236">Yokohama</text>
    <rect x="480" y="216" width="90" height="28" fill="#1F4E5F"/>
    <text x="582" y="236" fill="#1F4E5F">2.25%</text>

    <text x="70" y="288">Goodyear</text>
    <rect x="421" y="268" width="59" height="28" fill="#F4A261"/>
    <text x="365" y="288" fill="#F4A261">-1.48%</text>

    <text x="70" y="340">Continental</text>
    <rect x="280" y="320" width="200" height="28" fill="#D1495B" opacity="0.85"/>
    <text x="224" y="340" fill="#D1495B">-5.00%</text>

    <text x="70" y="392">Hankook</text>
    <rect x="211" y="372" width="269" height="28" fill="#D1495B"/>
    <text x="155" y="392" fill="#D1495B">-6.73%</text>
  </g>

  <rect x="95" y="520" width="18" height="18" fill="#D1495B"/>
  <text x="123" y="534" font-family="Arial" font-size="12" fill="#20252B">Michelin / negative peers</text>
  <rect x="310" y="520" width="18" height="18" fill="#2A9D8F"/>
  <text x="338" y="534" font-family="Arial" font-size="12" fill="#20252B">High positive peer</text>
  <rect x="510" y="520" width="18" height="18" fill="#1F4E5F"/>
  <text x="538" y="534" font-family="Arial" font-size="12" fill="#20252B">Positive peer</text>

  <text x="70" y="568" font-family="Arial" font-size="13" fill="#20252B">Readout: Michelin screens as one of the strongest cash generators in the peer set, tied with Bridgestone on FCF yield.</text>
  <text x="70" y="590" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#6B7280">Source: StockAnalysis peer statistics, April 2026. Pirelli FCF yield was not available and is excluded from the chart.</text>
</svg>
