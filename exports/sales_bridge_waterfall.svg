<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <rect width="1000" height="560" fill="#ffffff"/>
  <text x="90" y="34" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1F4E5F">Michelin sales bridge 2024-2025</text>
  <text x="90" y="56" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">EURm impact. Waterfall axis truncated at EUR 25.5bn to make the bridge readable.</text>

  <!-- Chart frame -->
  <line x1="90" y1="420" x2="920" y2="420" stroke="#20252B" stroke-width="1.2"/>
  <line x1="90" y1="60" x2="90" y2="420" stroke="#20252B" stroke-width="1.2"/>

  <!-- Gridlines and labels -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">
    <line x1="90" y1="420" x2="920" y2="420" stroke="#E6EBEF" stroke-width="1"/>
    <text x="42" y="424">25.5bn</text>
    <line x1="90" y1="325.3" x2="920" y2="325.3" stroke="#E6EBEF" stroke-width="1"/>
    <text x="42" y="329.3">26.0bn</text>
    <line x1="90" y1="230.5" x2="920" y2="230.5" stroke="#E6EBEF" stroke-width="1"/>
    <text x="42" y="234.5">26.5bn</text>
    <line x1="90" y1="135.8" x2="920" y2="135.8" stroke="#E6EBEF" stroke-width="1"/>
    <text x="42" y="139.8">27.0bn</text>
    <line x1="90" y1="60" x2="920" y2="60" stroke="#E6EBEF" stroke-width="1"/>
    <text x="42" y="64">27.4bn</text>
  </g>

  <!-- Connectors -->
  <g stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4 3">
    <line x1="180" y1="99.2" x2="225" y2="99.2"/>
    <line x1="295" y1="343.5" x2="340" y2="343.5"/>
    <line x1="410" y1="186.8" x2="455" y2="186.8"/>
    <line x1="525" y1="341.6" x2="570" y2="341.6"/>
    <line x1="640" y1="340.5" x2="685" y2="340.5"/>
    <line x1="755" y1="326.8" x2="800" y2="326.8"/>
  </g>

  <!-- Bars -->
  <g font-family="Arial, Helvetica, sans-serif">
    <!-- Start total -->
    <rect x="110" y="99.2" width="70" height="320.8" fill="#1F4E5F"/>
    <text x="145" y="91" text-anchor="middle" font-size="12" font-weight="700" fill="#20252B">27,193</text>
    <text x="145" y="451" text-anchor="middle" font-size="11" fill="#20252B">CA 2024</text>

    <!-- Volume negative -->
    <rect x="225" y="99.2" width="70" height="244.3" fill="#D1495B"/>
    <text x="260" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#D1495B">-1,289</text>
    <text x="260" y="451" text-anchor="middle" font-size="11" fill="#20252B">Volumes</text>

    <!-- Price-mix positive -->
    <rect x="340" y="186.8" width="70" height="156.7" fill="#2A9D8F"/>
    <text x="375" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#2A9D8F">+827</text>
    <text x="375" y="451" text-anchor="middle" font-size="11" fill="#20252B">Price-mix</text>

    <!-- FX negative -->
    <rect x="455" y="186.8" width="70" height="154.8" fill="#D1495B"/>
    <text x="490" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#D1495B">-817</text>
    <text x="490" y="451" text-anchor="middle" font-size="11" fill="#20252B">Devises</text>

    <!-- Scope positive, minimum visual height -->
    <rect x="570" y="337.5" width="70" height="3.0" fill="#2A9D8F"/>
    <text x="605" y="329" text-anchor="middle" font-size="12" font-weight="700" fill="#2A9D8F">+6</text>
    <text x="605" y="451" text-anchor="middle" font-size="11" fill="#20252B">Perimetre</text>

    <!-- Non-tire positive -->
    <rect x="685" y="326.8" width="70" height="13.7" fill="#2A9D8F"/>
    <text x="720" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="#2A9D8F">+72</text>
    <text x="720" y="451" text-anchor="middle" font-size="11" fill="#20252B">Non-pneus</text>

    <!-- End total -->
    <rect x="800" y="326.8" width="70" height="93.2" fill="#1F4E5F"/>
    <text x="835" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="#20252B">25,992</text>
    <text x="835" y="451" text-anchor="middle" font-size="11" fill="#20252B">CA 2025</text>
  </g>

  <!-- Legend -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#20252B">
    <rect x="90" y="500" width="14" height="14" fill="#1F4E5F"/>
    <text x="110" y="511">Sales level</text>
    <rect x="205" y="500" width="14" height="14" fill="#2A9D8F"/>
    <text x="225" y="511">Positive impact</text>
    <rect x="345" y="500" width="14" height="14" fill="#D1495B"/>
    <text x="365" y="511">Negative impact</text>
  </g>

  <text x="90" y="535" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#6B7280">Source: Michelin 2025 annual results guide. Values in EURm.</text>
</svg>
