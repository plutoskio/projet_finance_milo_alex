<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="620" viewBox="0 0 1050 620">
  <rect width="1050" height="620" fill="#ffffff"/>
  <text x="70" y="38" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1F4E5F">Michelin 2025 segment mix and profitability</text>
  <text x="70" y="60" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">Sales mix by reporting segment and EBIT margin. Auto is largest; specialties are smaller but high-margin.</text>
  <rect x="120.0" y="145" width="418.0" height="56" fill="#2A9D8F"/>
  <text x="329.0" y="179" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#ffffff">55.0%</text>
  <rect x="538.0" y="145" width="176.3" height="56" fill="#F4A261"/>
  <text x="626.2" y="179" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#ffffff">23.2%</text>
  <rect x="714.3" y="145" width="165.7" height="56" fill="#1F4E5F"/>
  <text x="797.2" y="179" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#ffffff">21.8%</text>
  <rect x="120" y="145" width="760" height="56" fill="none" stroke="#20252B"/>
  <g font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#20252B">
    <rect x="130" y="242" width="18" height="18" fill="#2A9D8F"/>
    <text x="160" y="256" font-weight="700">Auto</text>
    <text x="330" y="256">Sales mix: 55.0%</text>
    <rect x="500" y="232" width="304.2" height="24" fill="#2A9D8F" opacity="0.85"/>
    <text x="814.2" y="250">EBIT margin 11.7%</text>
    <rect x="130" y="314" width="18" height="18" fill="#F4A261"/>
    <text x="160" y="328" font-weight="700">Road transport</text>
    <text x="330" y="328">Sales mix: 23.2%</text>
    <rect x="500" y="304" width="122.2" height="24" fill="#F4A261" opacity="0.85"/>
    <text x="632.2" y="322">EBIT margin 4.7%</text>
    <rect x="130" y="386" width="18" height="18" fill="#1F4E5F"/>
    <text x="160" y="400" font-weight="700">Specialties</text>
    <text x="330" y="400">Sales mix: 21.8%</text>
    <rect x="500" y="376" width="351.0" height="24" fill="#1F4E5F" opacity="0.85"/>
    <text x="861.0" y="394">EBIT margin 13.5%</text>
  </g>
  <text x="120" y="535" font-family="Arial" font-size="13" fill="#20252B">Readout: the mix matters. Road transport has the weakest 2025 margin, while Auto and Specialties carry most of the profitability.</text>
  <text x="70" y="590" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#6B7280">Source: Michelin key figures 2020-2025, Sales and Reporting segments tabs.</text>
</svg>
